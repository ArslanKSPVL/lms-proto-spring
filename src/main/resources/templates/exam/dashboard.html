<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<div class="row">
    <div class="col-md-6">
        <h5>Create Exam Timetable Entry</h5>
        <form th:action="@{/exam/timetable}" method="post" class="row g-2">
            <div class="col-md-6">
                <select class="form-select" name="offeringId">
                    <option th:each="o : ${offerings}" th:value="${o.id}"
                            th:text="${o.course.code} + ' - ' + ${o.course.title}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <input class="form-control" name="examAt" placeholder="Date/time (ignored placeholder)">
            </div>
            <div class="col-md-3">
                <input class="form-control" name="venue" placeholder="Venue">
            </div>
            <div class="col-12 d-grid mt-2">
                <button class="btn btn-primary" type="submit">Add</button>
            </div>
        </form>

        <h6 class="mt-3">Timetable</h6>
        <table class="table table-striped table-sm">
            <thead>
            <tr>
                <th>Course</th>
                <th>Date/Time</th>
                <th>Venue</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${timetables}">
                <td th:text="${t.offering.course.code} + ' - ' + ${t.offering.course.title}"></td>
                <td th:text="${#temporals.format(t.examAt, 'dd MMM yyyy HH:mm')}"></td>
                <td th:text="${t.venue}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="col-md-6">
        <h5>Generate Results</h5>
        <form th:each="o : ${offerings}" th:action="@{'/exam/results/' + ${o.id} + '/generate'}" method="post"
              class="d-flex align-items-center mb-2">
            <span class="me-2" th:text="${o.course.code} + ' - ' + ${o.course.title}"></span>
            <button class="btn btn-sm btn-outline-primary" type="submit">Generate</button>
        </form>

        <h6 class="mt-3">Existing Results</h6>
        <table class="table table-striped table-sm">
            <thead>
            <tr>
                <th>Course</th>
                <th>Student</th>
                <th>Total Marks</th>
                <th>Grade</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${results}">
                <td th:text="${r.offering.course.code} + ' - ' + ${r.offering.course.title}"></td>
                <td th:text="${r.student.fullName}"></td>
                <td th:text="${r.totalMarks}"></td>
                <td th:text="${r.grade}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
