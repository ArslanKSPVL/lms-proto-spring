<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<div class="row">
    <div class="col-md-5">
        <h5>Create Course</h5>
        <form th:action="@{/admin/courses}" method="post">
            <div class="mb-2">
                <label class="form-label">Code</label>
                <input class="form-control" name="code" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Title</label>
                <input class="form-control" name="title" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Credits</label>
                <input class="form-control" name="credits" type="number" min="1" max="10" value="3" required>
            </div>
            <button class="btn btn-primary mt-2" type="submit">Create</button>
        </form>
    </div>
    <div class="col-md-7">
        <h5>Courses</h5>
        <table class="table table-striped table-sm">
            <thead>
            <tr>
                <th>Code</th>
                <th>Title</th>
                <th>Credits</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${courses}">
                <td th:text="${c.code}"></td>
                <td th:text="${c.title}"></td>
                <td th:text="${c.credits}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
