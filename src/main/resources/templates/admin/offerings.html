<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<div class="row">
    <div class="col-md-5">
        <h5>Create Course Offering</h5>
        <form th:action="@{/admin/offerings}" method="post">
            <div class="mb-2">
                <label class="form-label">Course</label>
                <select class="form-select" name="courseId">
                    <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.code} + ' - ' + ${c.title}"></option>
                </select>
            </div>
            <div class="mb-2">
                <label class="form-label">Faculty</label>
                <select class="form-select" name="facultyId">
                    <option th:each="f : ${facultyList}" th:value="${f.id}" th:text="${f.fullName} + ' (' + ${f.username} + ')'"></option>
                </select>
            </div>
            <div class="mb-2">
                <label class="form-label">Section</label>
                <input class="form-control" name="section" value="A">
            </div>
            <button class="btn btn-primary mt-2" type="submit">Create</button>
        </form>
    </div>
    <div class="col-md-7">
        <h5>Offerings</h5>
        <table class="table table-striped table-sm">
            <thead>
            <tr>
                <th>Course</th>
                <th>Section</th>
                <th>Faculty</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${offerings}">
                <td th:text="${o.course.code} + ' - ' + ${o.course.title}"></td>
                <td th:text="${o.section}"></td>
                <td th:text="${o.faculty.fullName}"></td>
                <td>
                    <form th:action="@{'/admin/offerings/' + ${o.id} + '/delete'}" method="post">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
