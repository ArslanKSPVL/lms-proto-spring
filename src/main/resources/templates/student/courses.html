<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<h5>My Courses</h5>
<table class="table table-striped table-sm">
    <thead>
    <tr>
        <th>Course</th>
        <th>Section</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${enrollments}">
        <td th:text="${e.offering.course.code} + ' - ' + ${e.offering.course.title}"></td>
        <td th:text="${e.offering.section}"></td>
        <td>
            <a class="btn btn-sm btn-primary" th:href="@{'/student/courses/' + ${e.id}}">Open</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
