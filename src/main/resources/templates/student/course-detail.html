<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<div class="mb-3">
    <h5 th:text="${enrollment.offering.course.code} + ' - ' + ${enrollment.offering.course.title}"></h5>
    <p class="text-muted">Section <span th:text="${enrollment.offering.section}"></span></p>
</div>

<h6>Content</h6>
<ul class="list-group mb-3">
    <li class="list-group-item" th:each="c : ${contents}">
        <strong th:text="${c.title}"></strong>
        <p class="mb-1" th:text="${c.description}"></p>
        <small th:text="${c.filePath}"></small>
    </li>
    <li th:if="${#lists.isEmpty(contents)}" class="list-group-item text-muted">No content yet.</li>
</ul>

<h6>Announcements</h6>
<div class="list-group mb-3">
    <div class="list-group-item" th:each="a : ${announcements}">
        <div class="d-flex justify-content-between">
            <h6 th:text="${a.title}"></h6>
            <small th:text="${#temporals.format(a.createdAt, 'dd MMM yyyy HH:mm')}"></small>
        </div>
        <p class="mb-1" th:text="${a.message}"></p>
    </div>
    <div th:if="${#lists.isEmpty(announcements)}" class="list-group-item text-muted">No announcements.</div>
</div>

<h6>Assignments</h6>
<table class="table table-striped table-sm">
    <thead>
    <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Submit</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${assignments}">
        <td th:text="${a.title}"></td>
        <td th:text="${a.description}"></td>
        <td>
            <form th:action="@{'/student/assignments/' + ${a.id} + '/submit'}" method="post"
                  enctype="multipart/form-data">
                <input class="form-control form-control-sm mb-1" type="file" name="file" required>
                <button class="btn btn-sm btn-primary" type="submit">Upload</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
