<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<div class="row">
    <div class="col-md-6">
        <h5>My Courses</h5>
        <ul class="list-group">
            <li class="list-group-item" th:each="e : ${enrollments}">
                <a th:href="@{'/student/courses/' + ${e.id}}">
                    <span th:text="${e.offering.course.code} + ' - ' + ${e.offering.course.title}"></span>
                </a>
            </li>
        </ul>
    </div>
    <div class="col-md-6">
        <h5>Notifications</h5>
        <div class="list-group" style="max-height: 250px; overflow-y:auto;">
            <div class="list-group-item" th:each="n : ${notifications}">
                <h6 th:text="${n.title}"></h6>
                <p th:text="${n.message}"></p>
            </div>
        </div>
    </div>
</div>

<div class="mt-3">
    <a class="btn btn-outline-primary me-2" th:href="@{/student/attendance}">Attendance</a>
    <a class="btn btn-outline-secondary me-2" th:href="@{/student/marks}">Internal Marks</a>
    <a class="btn btn-outline-secondary" th:href="@{/student/exams}">Exams</a>
</div>
</body>
</html>
