<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">
<body>
<h5>Attendance Summary</h5>
<table class="table table-striped table-sm">
    <thead>
    <tr>
        <th>Course</th>
        <th>Sessions</th>
        <th>Present</th>
        <th>Percentage</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${attendanceByOffering}">
        <td th:text="${entry.key.course.code} + ' - ' + ${entry.key.course.title}"></td>
        <td th:text="${#lists.size(entry.value)}"></td>
        <td th:text="${#numbers.formatInteger(entry.value.?[present].size(), 0)}"></td>
        <td>
            <span th:text="${#numbers.formatDecimal(100.0 * entry.value.?[present].size() / (entry.value.size() == 0 ? 1 : entry.value.size()), 1, 1)} + '%'"></span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
