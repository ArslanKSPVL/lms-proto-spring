<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'LMS Proto'">LMS Proto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS (default theme) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">LMS Proto</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/student/dashboard}" th:if="${#authorization.expression('hasRole(''STUDENT'')')}">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/faculty/dashboard}" th:if="${#authorization.expression('hasRole(''FACULTY'')')}">Faculty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/dashboard}" th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''SUPER_ADMIN'')')}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/exam/dashboard}" th:if="${#authorization.expression('hasRole(''EXAM_CELL'')')}">Exam Cell</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" th:if="${#authentication.principal != null}">
                    <span class="navbar-text me-2" th:text="${#authentication.name}">user</span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div th:if="${pageTitle}" class="mb-3">
        <h2 th:text="${pageTitle}">Page Title</h2>
        <hr>
    </div>
    <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
